<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoggyAI - Secure Node</title>
    <style>
        /* --- SOGGYAI ORANGE THEME --- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-main: #171412;
            --bg-sidebar: #1e1a17;
            --bg-input: #241e1a;
            --text-main: #f2ebe6;
            --text-muted: #b8aba2;
            --accent: #ff7700;
            --accent-hover: #ff9133;
            --user-bubble: #e65c00;
            --hover-bg: #2e2621;
            --border-color: #3b302a;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        #app-container { display: flex; width: 100%; height: 100%; }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-main);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .login-box {
            background-color: var(--bg-sidebar);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            text-align: center;
            width: 340px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .login-box h2 { color: var(--accent); margin-bottom: 8px; }
        .login-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        
        .login-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
            text-align: center;
        }
        .login-input:focus { border-color: var(--accent); }

        /* --- SIDEBAR & BUTTONS --- */
        #sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
            z-index: 20;
            border-right: 1px solid var(--border-color);
            position: relative;
        }
        #sidebar.closed { margin-left: -280px; }

        .sidebar-action-btn {
            margin: 16px 16px 4px 16px;
            padding: 12px 16px;
            background-color: var(--accent);
            color: #fff; border: none; border-radius: 24px;
            cursor: pointer; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; gap: 10px; transition: all 0.2s;
        }
        .sidebar-action-btn:hover { background-color: var(--accent-hover); transform: translateY(-1px); }

        #logout-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); margin-bottom: 16px; }

        #chat-list { flex-grow: 1; overflow-y: auto; padding: 0 12px; }

        .chat-list-item {
            padding: 8px 12px; margin-bottom: 4px; border-radius: 24px;
            cursor: pointer; font-size: 14px; color: var(--text-main);
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-list-item:hover, .chat-list-item.active { background: var(--hover-bg); border-left: 3px solid var(--accent); }
        
        .delete-chat-btn { opacity: 0; background: transparent; border: none; color: var(--text-muted); cursor: pointer; }
        .chat-list-item:hover .delete-chat-btn { opacity: 1; }

        /* --- CHAT AREA --- */
        #main-chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-main); min-width: 0; }
        #top-bar { padding: 16px 24px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
        .top-left { display: flex; align-items: center; gap: 12px; font-weight: 600; color: var(--accent); }

        #chat-history { flex-grow: 1; padding: 20px 20px 160px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 32px; align-items: center; }
        .message-row { display: flex; width: 100%; max-width: 820px; }
        .message-row.user { justify-content: flex-end; }
        .user-msg { background: var(--user-bubble); padding: 12px 20px; border-radius: 24px; color: white; }
        .ai-msg { color: var(--text-main); }

        /* --- INPUT --- */
        #input-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 820px; padding: 0 20px; box-sizing: border-box; }
        #input-wrapper { background: var(--bg-input); border-radius: 32px; border: 2px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; }
        #input-box { display: flex; padding: 10px 16px; align-items: center; gap: 8px; }
        #user-input { flex-grow: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; }
        #send-btn { background: var(--accent); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        #canvas-section { width: 0; opacity: 0; background: var(--bg-sidebar); border-left: 1px solid var(--border-color); transition: all 0.4s; }
        #canvas-section.open { width: 45%; opacity: 1; }

        .loading { opacity: 0.5; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>SoggyOS Secure</h2>
            <p>Access your local node</p>
            <input type="text" id="username-input" class="login-input" placeholder="Username" autocomplete="off">
            <input type="password" id="password-input" class="login-input" placeholder="Password">
            <button id="login-btn" class="sidebar-action-btn" style="margin:0; width:100%; justify-content:center;">Unlock Node</button>
            <p id="login-error" style="color:#ff4444; margin-top:10px; font-size:12px; display:none;">Invalid credentials</p>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <button id="new-chat-btn" class="sidebar-action-btn">New Chat</button>
            <button id="logout-btn" class="sidebar-action-btn">Log Out</button>
            <div id="chat-list"></div>
            <div id="telemetry-footer" style="padding:16px; font-family:monospace; font-size:10px; color:var(--text-muted); border-top:1px solid var(--border-color);">
                Node: <span id="user-display" style="color:var(--accent)">Guest</span>
            </div>
        </div>

        <div id="main-chat-area">
            <div id="top-bar">
                <div class="top-left">SoggyAI</div>
                <select id="persona-selector" style="background:var(--bg-input); color:white; border:none; border-radius:8px; padding:4px;">
                    <option value="default">Default</option>
                    <option value="coder">Coder</option>
                </select>
            </div>
            <div id="chat-history"></div>
            <div id="input-container">
                <div id="input-wrapper">
                    <div id="input-box">
                        <input type="text" id="user-input" placeholder="Type a message...">
                        <button id="send-btn">➔</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="canvas-section">
            <div style="padding:16px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between;">
                <span id="canvas-title">CANVAS</span>
                <button id="close-canvas" style="background:transparent; border:none; color:white; cursor:pointer;">✕</button>
            </div>
            <pre id="canvas-text" style="padding:24px; color:#ffebcc; white-space:pre-wrap; overflow-y:auto; height:calc(100% - 60px);"></pre>
        </div>
    </div>

    <script>
        const BASE_NGROK = "https://dilemmic-olevia-bioscopic.ngrok-free.dev";
        const CHAT_URL = `${BASE_NGROK}/chat`;
        const SYNC_URL = `${BASE_NGROK}/sync`;

        let currentUsername = localStorage.getItem('soggy_user') || null;
        let currentPassword = localStorage.getItem('soggy_pass') || null;
        let chats = [];
        let userMemory = { about: "", respond: "" };
        let currentChatId = null;
        let conversationHistory = [];

        const loginOverlay = document.getElementById('login-overlay');
        const usernameInput = document.getElementById('username-input');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const userDisplay = document.getElementById('user-display');
        const chatListUI = document.getElementById('chat-list');
        const chatHistoryUI = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function performLogin() {
            const user = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value;
            if (!user || !pass) return;
            
            loginError.style.display = 'none';

            try {
                const response = await fetch(SYNC_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (response.ok) {
                    const data = await response.json();
                    currentUsername = user;
                    currentPassword = pass;
                    localStorage.setItem('soggy_user', user);
                    localStorage.setItem('soggy_pass', pass);
                    
                    userDisplay.textContent = user.toUpperCase();
                    chats = data.chats || [];
                    userMemory = data.memory || { about: "", respond: "" };
                    
                    renderSidebar();
                    if (chats.length > 0) loadChat(chats[0].id);
                    else initNewChat();
                    
                    loginOverlay.style.opacity = '0';
                    setTimeout(() => loginOverlay.style.display = 'none', 500);
                } else {
                    loginError.style.display = 'block';
                }
            } catch (e) {
                alert("Connection failed. Check your Brain Server.");
            }
        }

        async function pushToServer() {
            if (!currentUsername || !currentPassword) return;
            await fetch(SYNC_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: currentUsername,
                    password: currentPassword,
                    chats: chats,
                    memory: userMemory
                })
            });
        }

        function renderSidebar() {
            chatListUI.innerHTML = '';
            chats.forEach(chat => {
                const item = document.createElement('div');
                item.className = 'chat-list-item' + (chat.id === currentChatId ? ' active' : '');
                item.innerHTML = `<span>${chat.title}</span><button class="delete-chat-btn">✕</button>`;
                item.onclick = () => loadChat(chat.id);
                item.querySelector('.delete-chat-btn').onclick = (e) => {
                    e.stopPropagation();
                    chats = chats.filter(c => c.id !== chat.id);
                    renderSidebar();
                    pushToServer();
                };
                chatListUI.appendChild(item);
            });
        }

        function loadChat(id) {
            const chat = chats.find(c => c.id === id);
            currentChatId = id;
            chatHistoryUI.innerHTML = '';
            conversationHistory = [{ role: "system", content: "You are SoggyAI." }];
            chat.messages.forEach(m => addMessageToUI(m.text, m.role));
            renderSidebar();
        }

        function initNewChat() {
            currentChatId = Date.now().toString();
            chats.unshift({ id: currentChatId, title: "New Chat", messages: [] });
            loadChat(currentChatId);
        }

        function addMessageToUI(text, sender) {
            const row = document.createElement('div');
            row.className = `message-row ${sender}`;
            row.innerHTML = `<div class="${sender}-msg">${text}</div>`;
            chatHistoryUI.appendChild(row);
            chatHistoryUI.scrollTop = chatHistoryUI.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessageToUI(text, 'user');
            userInput.value = '';
            
            const activeChat = chats.find(c => c.id === currentChatId);
            activeChat.messages.push({ role: 'user', text: text });
            if (activeChat.title === "New Chat") activeChat.title = text.substring(0, 20);
            
            conversationHistory.push({ role: 'user', content: text });

            const loadingNode = document.createElement('div');
            loadingNode.className = "message-row ai loading";
            loadingNode.innerHTML = `<div class="ai-msg">Thinking...</div>`;
            chatHistoryUI.appendChild(loadingNode);

            try {
                const response = await fetch(CHAT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        username: currentUsername,
                        messages: conversationHistory 
                    })
                });
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                
                loadingNode.remove();
                addMessageToUI(aiText, 'ai');
                activeChat.messages.push({ role: 'ai', text: aiText });
                conversationHistory.push({ role: 'assistant', content: aiText });
                
                pushToServer();
                renderSidebar();
            } catch (e) {
                loadingNode.innerHTML = "Offline Error.";
            }
        }

        loginBtn.onclick = performLogin;
        passwordInput.onkeypress = (e) => { if(e.key === 'Enter') performLogin(); };
        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
        document.getElementById('new-chat-btn').onclick = initNewChat;
        document.getElementById('logout-btn').onclick = () => {
            localStorage.clear();
            window.location.reload();
        };

        if (currentUsername && currentPassword) {
            usernameInput.value = currentUsername;
            passwordInput.value = currentPassword;
            performLogin();
        }
    </script>
</body>
</html>
